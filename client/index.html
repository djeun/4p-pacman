<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4P Pacman Battle</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ========== 로비 화면 ========== -->
  <div id="lobby">
    <div class="lobby-card">
      <h1 class="lobby-title">4P PACMAN</h1>
      <p class="lobby-subtitle">Online Pac-Man Battle &mdash; up to 4 players</p>

      <!-- Nickname -->
      <div class="form-group">
        <label for="name-input">Nickname</label>
        <input
          id="name-input"
          type="text"
          maxlength="12"
          placeholder="Enter nickname"
          autocomplete="off"
        />
      </div>

      <!-- Create room -->
      <div class="form-group">
        <button id="create-btn" class="btn btn-primary">Create Room</button>
      </div>

      <!-- Join by code -->
      <div class="form-group form-row">
        <input
          id="room-code-input"
          type="text"
          maxlength="4"
          placeholder="4-digit room code"
          autocomplete="off"
          style="text-transform: uppercase;"
        />
        <button id="join-btn" class="btn btn-secondary">Join</button>
      </div>

      <!-- Room info -->
      <div id="room-info" class="room-info">
        <div class="room-code-row">
          <p id="room-code" class="room-code-display"></p>
          <button id="copy-code-btn" class="btn btn-copy" title="Copy room code" style="display:none;">Copy</button>
        </div>

        <!-- Player list -->
        <div id="player-list-wrap">
          <h3>Players</h3>
          <ul id="player-list"></ul>
        </div>

        <!-- Round count (host only) -->
        <div id="round-count-wrap" class="form-group" style="display:none;">
          <label for="round-count-input">Total Rounds</label>
          <div class="round-count-row">
            <input id="round-count-input" type="number" min="1" max="20" value="5" />
            <span class="round-count-hint">rounds</span>
          </div>
        </div>

        <!-- Start button (host only) -->
        <button id="start-btn" class="btn btn-start" style="display: none;">
          Start Game
        </button>
      </div>
    </div>
  </div>

  <!-- ========== 게임 화면 ========== -->
  <div id="game" style="display: none;">
    <div class="game-wrap">
      <canvas id="game-canvas" width="672" height="672"></canvas>

      <!-- 라운드 종료 점수 오버레이 -->
      <div id="score-overlay" class="overlay" style="display: none;">
        <div id="score-content" class="overlay-card"></div>
      </div>

      <!-- 게임 종료 최종 결과 오버레이 -->
      <div id="game-end-overlay" class="overlay" style="display: none;">
        <div id="game-end-content" class="overlay-card"></div>
      </div>
    </div>
  </div>

  <!-- ========== 토스트 알림 ========== -->
  <div id="toast-container"></div>

  <!-- ========== 스크립트 로드 순서 ========== -->
  <!-- 1. socket.io (서버가 자동 제공) -->
  <script src="/socket.io/socket.io.js"></script>
  <!-- 2. 공유 상수 -->
  <script src="js/constants.js"></script>
  <!-- 3. 게임 클라이언트 상태 -->
  <script src="js/GameClient.js"></script>
  <!-- 4. 키보드 입력 처리 -->
  <script src="js/InputHandler.js"></script>
  <!-- 5. 캔버스 렌더러 -->
  <script src="js/Renderer.js"></script>
  <!-- 6. 진입점 -->
  <script src="js/main.js"></script>

</body>
</html>
